    <script>
// 🎵 Tap anywhere music
let isPlaying = false;
function startMusic() {
    if (!isPlaying) {
        let music = document.getElementById("bgMusic");
        music.play();
        isPlaying = true;
    }
}

let index = 0;
let slides = document.getElementsByClassName("slide");

function showSlides() {
    for (let i = 0; i < slides.length; i++) {
        slides[i].classList.remove("active");
    }

    index++;
    if (index > slides.length) {
        index = 1;
    }

    slides[index - 1].classList.add("active");

    setTimeout(showSlides, 2000); // change every 2 sec
}

showSlides();
</script>
<style>
.slideshow {
    position: relative;
    width: 250px;
    margin: auto;
}

.slide {
    width: 100%;

    display: none;
}

.slide.active {

}

<style>
    
.popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
}

.popup-content {
    background: white;
    color: black;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    animation: zoomIn 0.5s ease;
}

@keyframes zoomIn {
    from { transform: scale(0); }
    to { transform: scale(1); }
}

.heart {
    font-size: 50px;
    display: inline-block;
    animation: heartbeat 1s infinite;
}

@keyframes heartbeat {
    0% { transform: scale(1); }
    25% { transform: scale(1.2); }
    50% { transform: scale(1); }
    75% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

@keyframes beat {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
}
</style>
